<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registration Dashboard</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --border: #e5e7eb;
      --success: #16a34a;
      --warning: #f59e0b;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      background: #111827;
      color: #fff;
      padding: 24px;
    }

    .brand {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 28px;
    }

    .nav {
      display: grid;
      gap: 10px;
    }

    .nav a {
      text-decoration: none;
      color: #d1d5db;
      padding: 12px 14px;
      border-radius: 12px;
      display: block;
    }

    .nav a.active,
    .nav a:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
    }

    .main {
      padding: 28px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .header h1 {
      margin: 0;
      font-size: 1.9rem;
    }

    .header p {
      margin: 6px 0 0;
      color: var(--muted);
    }

    .date-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 16px;
      box-shadow: var(--shadow);
      color: var(--muted);
      font-size: 0.95rem;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
      margin-bottom: 24px;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      padding: 20px;
    }

    .stat-label {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 10px;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 700;
    }

    .content {
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      gap: 20px;
    }

    .section-title {
      margin: 0 0 16px;
      font-size: 1.2rem;
    }

    form {
      display: grid;
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    label {
      font-weight: 600;
      font-size: 0.95rem;
    }

    input,
    select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 0.96rem;
      outline: none;
      background: #fff;
    }

    input:focus,
    select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .btn {
      border: none;
      background: var(--primary);
      color: #fff;
      padding: 13px 16px;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }

    .btn:hover {
      background: var(--primary-dark);
    }

    .message {
      font-size: 0.95rem;
      min-height: 20px;
      color: var(--success);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      text-align: left;
      padding: 12px 10px;
      border-bottom: 1px solid var(--border);
      font-size: 0.95rem;
    }

    th {
      color: var(--muted);
      font-weight: 700;
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 700;
    }

    .badge.active {
      background: rgba(22, 163, 74, 0.12);
      color: var(--success);
    }

    .badge.pending {
      background: rgba(245, 158, 11, 0.14);
      color: var(--warning);
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .sidebar {
        display: none;
      }

      .content,
      .stats {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">RegiPanel</div>
      <nav class="nav">
        <a href="#" class="active">Dashboard</a>
        <a href="#">Registrations</a>
        <a href="#">Reports</a>
        <a href="#">Settings</a>
      </nav>
    </aside>

    <main class="main">
      <div class="header">
        <div>
          <h1>Registration Dashboard</h1>
          <p>Manage new sign-ups and monitor recent registrations.</p>
        </div>
        <div class="date-box" id="today"></div>
      </div>

      <section class="stats">
        <div class="card">
          <div class="stat-label">Total Registrations</div>
          <div class="stat-value" id="totalCount">3</div>
        </div>
        <div class="card">
          <div class="stat-label">Active Users</div>
          <div class="stat-value" id="activeCount">2</div>
        </div>
        <div class="card">
          <div class="stat-label">Pending Approval</div>
          <div class="stat-value" id="pendingCount">1</div>
        </div>
      </section>

      <section class="content">
        <div class="card">
          <h2 class="section-title">New Registration</h2>
          <form id="registrationForm">
            <div class="field">
              <label for="fullName">Full Name</label>
              <input type="text" id="fullName" placeholder="Enter full name" required />
            </div>

            <div class="field">
              <label for="email">Email Address</label>
              <input type="email" id="email" placeholder="Enter email address" required />
            </div>

            <div class="field">
              <label for="role">Role</label>
              <select id="role" required>
                <option value="">Select role</option>
                <option>Student</option>
                <option>Member</option>
                <option>Admin</option>
                <option>Guest</option>
              </select>
            </div>

            <div class="field">
              <label for="status">Status</label>
              <select id="status" required>
                <option value="">Select status</option>
                <option>Active</option>
                <option>Pending</option>
              </select>
            </div>

            <button class="btn" type="submit">Add Registration</button>
            <div class="message" id="message"></div>
          </form>
        </div>

        <div class="card">
          <h2 class="section-title">Recent Registrations</h2>
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="registrationTable"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script>
    const registrations = [
      { name: 'John Carter', email: 'john@example.com', role: 'Student', status: 'Active' },
      { name: 'Maria Lee', email: 'maria@example.com', role: 'Member', status: 'Pending' },
      { name: 'David Cruz', email: 'david@example.com', role: 'Admin', status: 'Active' }
    ];

    const tableBody = document.getElementById('registrationTable');
    const totalCount = document.getElementById('totalCount');
    const activeCount = document.getElementById('activeCount');
    const pendingCount = document.getElementById('pendingCount');
    const form = document.getElementById('registrationForm');
    const message = document.getElementById('message');
    const today = document.getElementById('today');

    today.textContent = new Date().toLocaleDateString(undefined, {
      weekday: 'long',
      year: 'numeric',
      month: 'long',
      day: 'numeric'
    });

    function renderTable() {
      tableBody.innerHTML = '';

      registrations.forEach((user) => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${user.name}</td>
          <td>${user.email}</td>
          <td>${user.role}</td>
          <td><span class="badge ${user.status.toLowerCase()}">${user.status}</span></td>
        `;
        tableBody.appendChild(row);
      });

      totalCount.textContent = registrations.length;
      activeCount.textContent = registrations.filter(user => user.status === 'Active').length;
      pendingCount.textContent = registrations.filter(user => user.status === 'Pending').length;
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();

      const name = document.getElementById('fullName').value.trim();
      const email = document.getElementById('email').value.trim();
      const role = document.getElementById('role').value;
      const status = document.getElementById('status').value;

      registrations.unshift({ name, email, role, status });
      renderTable();
      form.reset();
      message.textContent = 'Registration added successfully.';

      setTimeout(() => {
        message.textContent = '';
      }, 2500);
    });

    renderTable();
  </script>
</body>
</html>
